<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CISO Security Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c1220;--bg2:#131b2e;--bg3:#182240;--bg4:#1a2540;--bg5:#0f1829;--bd:#1e2d4a;--bd2:#253556;--t1:#e2e8f0;--t2:#8899b4;--t3:#5a6d8a;--blue:#3b82f6;--green:#10b981;--amber:#f59e0b;--violet:#8b5cf6;--red:#ef4444;--cyan:#06b6d4;--orange:#f97316;--r:12px;--f:'DM Sans',sans-serif;--m:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--t1);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* SIDEBAR */
.sidebar{width:240px;background:linear-gradient(180deg,#0a0f1f,#111c38);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.sidebar-logo .icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#6366f1);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(59,130,246,0.3)}
.sidebar-logo h1{font-size:15px;font-weight:800;color:#fff;line-height:1.2}
.sidebar-logo span{font-size:10px;color:var(--t3);display:block;margin-top:2px}
.nav-section{padding:16px 12px 8px}
.nav-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:0 8px;margin-bottom:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--t1)}
.nav-item.active{background:rgba(59,130,246,.12);color:var(--blue)}
.nav-item .badge{margin-left:auto;font-size:11px;font-weight:700;font-family:var(--m);padding:1px 7px;border-radius:10px;background:rgba(255,255,255,.06);color:var(--t3)}
.nav-item.active .badge{background:rgba(59,130,246,.2);color:var(--blue)}
.nav-divider{height:1px;background:var(--bd);margin:8px 12px}

/* MAIN */
.main-area{margin-left:240px;flex:1;min-height:100vh}
.topbar{padding:16px 28px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:14px;background:var(--bg2);position:sticky;top:0;z-index:50}
.search-box{flex:1;max-width:500px;position:relative}
.search-box input{width:100%;padding:9px 14px 9px 36px;border-radius:10px;border:1.5px solid var(--bd);background:var(--bg5);color:var(--t1);font-family:var(--f);font-size:13px;outline:none}
.search-box input:focus{border-color:var(--blue)}
.search-box::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-pills select{padding:7px 12px;border-radius:8px;border:1.5px solid var(--bd);background:var(--bg5);color:var(--t1);font-family:var(--f);font-size:12px;font-weight:600;cursor:pointer;outline:none}
.filter-count{font-size:12px;color:var(--t3);font-weight:500;margin-left:8px}
.content{padding:24px 28px 60px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;transition:border-color .2s}
.kpi:hover{border-color:var(--bd2)}
.kpi-l{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.kpi-v{font-size:26px;font-weight:800;font-family:var(--m);letter-spacing:-1px}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .15s;border-left:4px solid transparent}
.card:hover{background:var(--bg3);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:16px;text-transform:uppercase;letter-spacing:.4px;display:inline-flex;align-items:center;gap:3px}
.sev-pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px}
.card-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:5px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-desc{font-size:12px;color:var(--t3);line-height:1.4;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px}
.card-owner{font-weight:600;color:var(--t2)}
.card-tracker{font-size:10px;color:var(--t3);padding:2px 6px;background:rgba(255,255,255,.04);border-radius:6px}
.gantt{width:100%;height:7px;background:var(--bg5);border-radius:4px;overflow:hidden;position:relative;margin-bottom:5px}
.gantt-bar{position:absolute;height:100%;border-radius:4px;min-width:3px;opacity:.85}
.card-dates{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);font-family:var(--m)}
.card-btns{display:flex;gap:3px}
.card-btns button{width:26px;height:26px;border-radius:6px;border:1px solid var(--bd);background:var(--bg4);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .15s}
.card-btns button:hover{background:var(--bg3);border-color:var(--bd2)}

/* TABLE */
.tbl-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.tbl-scroll{overflow:auto;max-height:72vh}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:12px 10px;text-align:left;font-weight:700;color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bd);background:var(--bg4);position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap;z-index:2}
th:hover{color:var(--t1)}
td{padding:10px;border-bottom:1px solid rgba(30,45,74,.4)}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--bg3)}
.td-name{font-weight:600;color:var(--t1);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-muted{color:var(--t3);font-family:var(--m);font-size:11px;white-space:nowrap}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(5px);animation:fi .15s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;width:min(620px,94vw);max-height:85vh;overflow:auto;box-shadow:0 30px 60px rgba(0,0,0,.5)}
.modal-h{padding:20px 24px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.modal-h h2{font-size:17px;font-weight:700}
.modal-x{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:var(--bg4);color:var(--t3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-b{padding:18px 24px 24px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fv{font-size:13px;color:var(--t1);line-height:1.5;white-space:pre-wrap}
.fi,.fs,.ft{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--bd);background:var(--bg5);color:var(--t1);font-family:var(--f);font-size:13px;outline:none}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--blue)}
.ft{min-height:60px;resize:vertical}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-a{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.btn{padding:8px 18px;border-radius:8px;font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-p{background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;color:#fff;box-shadow:0 3px 10px rgba(59,130,246,.3)}
.btn-p:hover{box-shadow:0 5px 16px rgba(59,130,246,.4);transform:translateY(-1px)}
.btn-c{background:var(--bg4);border:1px solid var(--bd);color:var(--t2)}
.btn-d{background:var(--red);border:none;color:#fff}
.btn-add{position:fixed;bottom:28px;right:28px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 6px 20px rgba(59,130,246,.4);display:flex;align-items:center;justify-content:center;z-index:90;transition:transform .15s}
.btn-add:hover{transform:scale(1.1)}

/* SECTION */
.sec-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-t{font-size:15px;font-weight:700}
.sec-b{font-size:12px;font-weight:600;padding:3px 10px;border-radius:14px;background:rgba(255,255,255,.04);color:var(--t3)}
.toggle{cursor:pointer;font-size:13px;font-weight:700;color:var(--t3);padding:12px 0;display:flex;align-items:center;gap:8px;user-select:none}
.toggle .arr{transition:transform .2s;display:inline-block}

/* Charts */
.ch-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:900px){.ch-row{grid-template-columns:1fr}}
.ch-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:20px}
.ch-t{font-size:13px;font-weight:700;margin-bottom:16px}
.wl-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.wl-name{font-size:11px;color:var(--t2);width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.wl-bar{flex:1;height:16px;background:var(--bg5);border-radius:3px;overflow:hidden;display:flex}
.wl-n{font-size:11px;font-weight:700;font-family:var(--m);width:24px;text-align:right}

@media(max-width:768px){.sidebar{display:none}.main-area{margin-left:0}.grid{grid-template-columns:1fr}.ch-row{grid-template-columns:1fr}.fr{grid-template-columns:1fr}}
.fade{opacity:0;animation:cfi .3s ease forwards}
@keyframes cfi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

function gantt(t){const h=gH(t);if(!t.startDate&&!t.targetDate)return'<span style="color:var(--t3);font-size:10px">—</span>';
const s=t.startDate?new Date(t.startDate):null,en=t.targetDate?new Date(t.targetDate):null;
if(s&&isNaN(s))return'—';const r0=new Date("2022-01-01"),r1=new Date("2026-12-01"),tot=(r1-r0)/864e5;
const sP=s?Math.max(0,(s-r0)/864e5/tot*100):0,eP=en&&!isNaN(en)?Math.min(100,(en-r0)/864e5/tot*100):sP+2;
const w=Math.max(1.5,eP-sP),col=HC[h]?.c||"#5a6d8a";
return`<div class="gantt"><div class="gantt-bar" style="left:${sP}%;width:${w}%;background:${col}"></div></div>`;}

document.body.appendChild(o);}

<div class="fl" style="margin-bottom:10px">Update Timeline</div>
${hist.map(u=>`<div style="padding:8px 12px;background:var(--bg5);border-radius:8px;margin-bottom:6px;border-left:3px solid ${u.status==='Closed'?'var(--green)':u.status==='In Progress'?'var(--amber)':'var(--blue)'}">

<span style="font-size:10px;color:var(--t3);font-family:var(--m)">${e(u.date)}</span></div>

<div class="modal-a"><button class="btn btn-c" onclick="this.closest('.modal-bg').remove()">Close</button>
<button class="btn btn-p" onclick="this.closest('.modal-bg').remove();openUpd(${t.sn})">📝 Quick Update</button></div>`);}

function gFD(){return{sn:+document.getElementById('fsn').value,name:document.getElementById('fn').value.trim(),

targetDate:document.getElementById('ftd').value,remarks:document.getElementById('frm').value.trim(),tracker:"Manual"};}

function openE(sn){const t=tasks.find(x=>x.sn===sn);if(!t)return;showM('Edit Task',formH(t,'saveE'));}

function saveE(){const d=gFD();if(!d.name||!d.responsibility)return alert('Fill Name & Owner');
const now=new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
d.lastUpdate=now;
tasks=tasks.map(t=>t.sn===d.sn?{...t,...d}:t);document.querySelector('.modal-bg').remove();render();}
function saveA(){const d=gFD();if(!d.name||!d.responsibility)return alert('Fill Name & Owner');d.sn=Math.max(...tasks.map(t=>t.sn),0)+1;
d.lastUpdate=new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
d.updates=[];tasks.push(d);document.querySelector('.modal-bg').remove();render();}

<div class="fl" style="margin-bottom:10px">Recent Update History</div>
${hist.map(u=>`<div style="padding:8px 12px;background:var(--bg5);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--blue)">
<div style="display:flex;justify-content:space-between;margin-bottom:3px">
<span style="font-size:11px;font-weight:700;color:var(--blue)">${e(u.status||'')}</span>
<span style="font-size:10px;color:var(--t3);font-family:var(--m)">${e(u.date||'')}</span></div>
<div style="font-size:12px;color:var(--t2)">${e(u.note||'')}</div></div>`).join('')}</div>`:''}
<div class="modal-a"><button class="btn btn-c" onclick="this.closest('.modal-bg').remove()">Cancel</button>
<button class="btn btn-p" onclick="saveUpd()">💾 Save Update</button></div>`);}

function saveUpd(){
const sn=+document.getElementById('usn').value;
const status=document.getElementById('us').value;
const td=document.getElementById('utd').value;
const note=document.getElementById('un').value.trim();
const now=new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
tasks=tasks.map(t=>{
if(t.sn!==sn)return t;
const updates=t.updates||[];
updates.push({date:now,status:status,note:note||'Status updated',prevStatus:t.status});
return{...t,status,targetDate:td||t.targetDate,lastUpdate:now,updates,remarks:note?note:t.remarks};
});
document.querySelector('.modal-bg').remove();render();}

function cfmDel(sn){const t=tasks.find(x=>x.sn===sn);showM('Delete Task',`<p style="color:var(--t2);margin-bottom:20px">Delete <strong style="color:var(--t1)">#${sn} ${e(t?.name||'')}</strong>?</p>
<div class="modal-a"><button class="btn btn-c" onclick="this.closest('.modal-bg').remove()">Cancel</button><button class="btn btn-d" onclick="doDel(${sn})">Delete</button></div>`);}
function doDel(sn){tasks=tasks.filter(t=>t.sn!==sn);document.querySelector('.modal-bg').remove();render();}
function doS(c){if(sortC===c)sortD=sortD==="asc"?"desc":"asc";else{sortC=c;sortD="asc";}render();}

render();

</script>
</body>
